<nav class="topbar">
  <p>📍 Encuentra tu tienda más cercana</p>
</nav>

<nav class="navbar">
  <h1>🍩 Krispy Kreme</h1>
  <div class="links">
    <a>Inicio</a>
    <a>Menú</a>
    <a>Locales</a>
    <a>Contacto</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-text">
    <h1>Cinnamon Rolls 🍩</h1>
    <p>Los mejores donuts del mundo</p>
    <button>Ordenar ahora</button>
  </div>
</section>

<h2 class="titulo">Nuestro Menú</h2>

<p>Productos: {{ productos.length }}</p>
<div class="productos">
  <div class="card" *ngFor="let p of productos">
    <h3>{{ p.nombre }}</h3>
    <p>{{ p.precio }}</p>
    <button>Comprar</button>
  </div>
</div>

<section class="video">
  <iframe width="560" height="315"
    src="https://www.youtube.com/embed/1APwq1df6Mw"
    frameborder="0"
    allowfullscreen>
  </iframe>
</section>

<footer class="footer">
  <p>© Krispy Kreme</p>
</footer>
